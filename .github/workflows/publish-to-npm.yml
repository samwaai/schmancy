name: Bump Version & Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'mixins/**'
      - 'plugins/**'
      - 'package.json'
      - 'skills/**'
      - '.claude-plugin/**'
      - '.yarnrc.yml'
      - 'vite.config.ts'
      - 'vite.config.agent.ts'
      - 'lab/**'

permissions:
  contents: write

jobs:
  bump-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack and prepare Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: Install dependencies
        # --no-immutable: this submodule deliberately has no committed
        # yarn.lock (see chore c98d555 "drop nested yarn project files").
        # Yarn 4 in CI (CI=true) would otherwise default to immutable mode
        # and fail without a lockfile. We want CI to resolve + write a
        # fresh lockfile every run.
        run: yarn install --no-immutable

      # Vitest browser mode uses Playwright's Chromium. The browser binary
      # is not downloaded by `yarn install` — install it explicitly before
      # the smoke test step.
      - name: Install Playwright Chromium
        run: yarn playwright install chromium --with-deps

      # Handover §4.4 acceptance: load the bundle in a real browser,
      # assert registration + `window.schmancy.help()` surface. Blocks
      # publish on regression.
      - name: Agent bundle smoke test
        run: yarn vitest run src/agent/

      - name: Authenticate with npm
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Bump BEFORE build so `yarn build:handover` renders dist/handover/*.md
      # against the version that will actually ship. Previously build ran
      # first and the rendered handover lagged by one patch release.
      - name: Bump package version
        run: yarn version patch

      - name: Build project
        run: yarn build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Bump and publish @mhmo91/schmancy-lab as a sibling. Lab versions
      # independently; both packages share this commit + tag flow but each
      # ships its own version to npm. See lab/README.md for the Lab
      # acceptance + graduation policy.
      - name: Bump lab package version
        working-directory: lab
        run: npm version patch --no-git-tag-version

      # Refresh the lockfile so the post-bump main schmancy version + the
      # post-bump lab version both resolve. Without this, `yarn workspace`
      # commands fail with "@mhmo91/schmancy@workspace:.: not present in
      # your lockfile" because the install at the top of the job ran
      # against the pre-bump versions.
      - name: Refresh lockfile after version bumps
        run: yarn install --no-immutable

      - name: Build lab
        run: yarn workspace @mhmo91/schmancy-lab build

      - name: Publish lab to npm
        working-directory: lab
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit bumped versions and Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "ci: bump package versions [skip ci]"
          VERSION=$(node -p "require('./package.json').version")
          LAB_VERSION=$(node -p "require('./lab/package.json').version")
          git tag -a "v$VERSION" -m "Release schmancy v$VERSION + lab v$LAB_VERSION"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin --tags
          git push
